name: Publish

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read
  id-token: write # lets the job mint the OIDC token npm uses for Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm (Trusted Publishing requires npm >= 11.5.1)
        run: npm install -g npm@^11.5.1

      - run: npm ci

      - run: npm test

      # First publish uses the NPM_TOKEN repository secret (Trusted Publishing can only be
      # configured on npmjs.com once the package exists). After v0.1.0 is live: register the
      # Trusted Publisher (repo MrHadik/n8n-nodes-zaple, workflow publish.yml) on npmjs.com,
      # then this env block can be removed and OIDC takes over.
      - run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
